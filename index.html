<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>BuyList</title>
    <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
    <main class="container">
        <section class="main-panel">
            <form class="add-item-row" id="add-form" onsubmit="return false;">
                <input type="text" id="item-input" placeholder="Назва товару" class="add-input" required>
                <button type="submit" class="btn btn-blue" data-tooltip="Додати новий товар до списку">Додати</button>
            </form>
            
            <hr class="divider">

            <ul class="item-list" id="items-container">
                <li class="item">
                    <span class="item-name crossed">Помідори</span>
                    <div class="item-controls center-controls">
                        <span class="amount-badge">2</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-silver" data-tooltip="Повернути товар у список">Не куплено</button>
                    </div>
                </li>
                
                <hr class="divider">

                <li class="item">
                    <span class="item-name">Печиво</span>
                    <div class="item-controls">
                        <button class="btn btn-round btn-red" data-tooltip="Зменшити кількість">-</button>
                        <span class="amount-badge">2</span>
                        <button class="btn btn-round btn-green" data-tooltip="Збільшити кількість">+</button>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-silver" data-tooltip="Відмітити як куплене">Куплено</button>
                        <button class="btn btn-square btn-red" data-tooltip="Видалити товар">×</button>
                    </div>
                </li>
                
                <hr class="divider">

                <li class="item">
                    <input type="text" value="Сир" class="edit-input">
                    <div class="item-controls">
                        <button class="btn btn-round btn-red disabled" data-tooltip="Мінімум 1">-</button>
                        <span class="amount-badge">1</span>
                        <button class="btn btn-round btn-green" data-tooltip="Збільшити кількість">+</button>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-silver" data-tooltip="Відмітити як куплене">Куплено</button>
                        <button class="btn btn-square btn-red" data-tooltip="Видалити товар">×</button>
                    </div>
                </li>
            </ul>
        </section>

        <aside class="sidebar">
            <section class="summary-section">
                <h2>Залишилося</h2>
                <hr class="divider">
                <div class="tag-list" id="left-to-buy-container">
                    <span class="product-item">Печиво <span class="amount">2</span></span>
                    <span class="product-item">Сир <span class="amount">1</span></span>
                </div>
            </section>
            
            <section class="summary-section">
                <h2>Куплено</h2>
                <hr class="divider">
                <div class="tag-list" id="bought-container">
                    <span class="product-item crossed-tag">Помідори <span class="amount">2</span></span>
                </div>
            </section>
        </aside>
    </main>

    <footer class="author-badge">
        <span class="badge-title">BuyList</span>
        <span class="badge-name">Гриценко Богдан Олександрович</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
